name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Accept Android SDK licenses
        run: |
          yes | yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | yes | sdkmanager --licenses || true

      - name: Build APK
        working-directory: Dimmer
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          gradle -V
          gradle assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dimmer-debug-apk
          path: Dimmer/app/build/outputs/apk/debug/app-debug.apk
