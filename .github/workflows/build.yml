name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Generate Gradle Wrapper
        run: |
          cd Dimmer
          gradle wrapper

      - name: Build APK
        working-directory: Dimmer
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dimmer-debug-apk
          path: Dimmer/app/build/outputs/apk/debug/app-debug.apk
