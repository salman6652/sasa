name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Gradle
        run: |
          mkdir -p "$HOME/.gradle/wrapper/dists"
          GRADLE_VERSION=8.4
          GRADLE_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          cd /tmp
          curl -LO "$GRADLE_URL"
          unzip -q "gradle-${GRADLE_VERSION}-bin.zip"
          sudo mv gradle-${GRADLE_VERSION} /opt/gradle
          sudo ln -sf /opt/gradle/bin/gradle /usr/local/bin/gradle

      - name: Build debug APK
        working-directory: Dimmer
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          ./gradlew assembleDebug --no-daemon 2>/dev/null || gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dimmer-debug-apk
          path: Dimmer/app/build/outputs/apk/debug/app-debug.apk
